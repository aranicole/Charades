<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charades 🎭</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #4a041a;   
            --bg-mid: #881b42;    
            --bg-light: #e57ca3;  
            --card-bg: #6b0f30;
            --text: #ffffff;
        }

        /* Mobile Layout Optimization */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            background: var(--bg-dark);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100dvh; 
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .app-header h1 {
            font-size: 1.5rem;
            text-align: center;
            margin: 10px 0;
            color: var(--bg-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        /* Navigation Tabs */
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 15px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(229, 124, 163, 0.3);
            color: var(--text);
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.7rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .tab-btn.active { 
            background: var(--bg-light); 
            color: var(--bg-dark); 
            border-color: var(--bg-light);
            box-shadow: 0 4px 15px rgba(229, 124, 163, 0.3);
        }

        .content-section { 
            display: none; 
            flex: 1; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .content-section.active { display: flex; }

        /* Gameplay Card */
        .card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px solid var(--bg-light);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            margin-bottom: 15px;
        }

        .category-tag { 
            position: absolute; 
            top: 25px; 
            width: 100%;
            left: 0;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            color: var(--bg-light); 
            font-weight: bold; 
            letter-spacing: 2px;
            opacity: 0.8;
        }

        #display-text { 
            font-size: 2.8rem; 
            font-weight: 900; 
            margin: 0; 
            line-height: 1.1;
            word-wrap: break-word;
        }

        .btn-main {
            background: var(--bg-light);
            color: var(--bg-dark);
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.98); }

        /* Timer UI */
        .timer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 15px 0;
            background: rgba(0,0,0,0.25);
            border-radius: 25px;
            margin-top: 10px;
        }

        .timer-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 2rem;
            background: rgba(0,0,0,0.3);
        }

        .time-adjuster {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .adj-btn {
            background: var(--bg-light);
            color: var(--bg-dark);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.2rem;
        }

        /* List & Form Styles */
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 15px;
        }
        
        .cat-select-btn { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--bg-mid); 
            color: var(--text); 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .cat-select-btn.selected { 
            background: var(--bg-mid); 
            border-color: var(--bg-light); 
        }

        .list-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--bg-light);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 16px; 
            margin-bottom: 10px;
        }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.95rem;
        }

        .del-x { color: #ff5f5f; font-weight: bold; padding: 5px 10px; }

        @media (min-height: 750px) {
            .timer-circle { width: 110px; height: 110px; font-size: 2.5rem; }
            #display-text { font-size: 3.2rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header"><h1>Charades 🎭</h1></div>

    <div class="tabs">
        <button id="btn-game" class="tab-btn active" onclick="showTab('game')">
            <i class="fas fa-play"></i><span>PLAY</span>
        </button>
        <button id="btn-custom" class="tab-btn" onclick="showTab('custom')">
            <i class="fas fa-edit"></i><span>ADD OWN</span>
        </button>
        <button id="btn-history" class="tab-btn" onclick="showTab('history')">
            <i class="fas fa-list-ul"></i><span>HISTORY</span>
        </button>
    </div>

    <div id="game-section" class="content-section active">
        <div class="card">
            <span id="category-label" class="category-tag">Ready?</span>
            <h1 id="display-text">START</h1>
        </div>
        <button class="btn-main" onclick="generateCharade()">NEXT PROMPT</button>
        <div class="timer-area">
            <div id="timer-display" class="timer-circle">1:30</div>
            <div class="time-adjuster">
                <button class="adj-btn" onclick="adjustMaxTime(-15)">−</button>
                <span id="setting-display" style="font-weight:900;">Set: 1:30</span>
                <button class="adj-btn" onclick="adjustMaxTime(15)">+</button>
            </div>
        </div>
    </div>

    <div id="custom-section" class="content-section">
        <div class="category-grid">
            <button class="cat-select-btn selected" onclick="selectCat(this, 'Movie')"><i class="fas fa-film"></i> Movie</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'Song')"><i class="fas fa-music"></i> Song</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'TV')"><i class="fas fa-tv"></i> TV</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'Food')"><i class="fas fa-hamburger"></i> Food</button>
        </div>
        <input type="text" id="custom-input" placeholder="Type a word or phrase...">
        <button class="btn-main" onclick="addCustomItem()">ADD TO DECK</button>
        <div class="list-container" id="custom-list"></div>
    </div>

    <div id="history-section" class="content-section">
        <div class="list-container" id="history-container"></div>
        <button class="btn-main" style="background:var(--bg-mid); color:white; margin-top:10px" onclick="clearData()">RESET ALL DATA</button>
    </div>
</div>

<script>
    const masterData = {
        "Movie": ["Frozen", "Jurassic Park", "Toy Story", "Spider-Man", "The Matrix", "Lion King", "Home Alone", "Finding Nemo", "Avatar", "Inside Out", "The Avengers", "Jaws", "Star Wars", "Harry Potter", "Moana", "Shrek", "Titanic", "Ghostbusters", "Back to the Future", "Encanto"],
        "Song": ["Let It Go", "Thriller", "Baby Shark", "Shake It Off", "Happy", "Hakuna Matata", "Uptown Funk", "Old Town Road", "Stayin' Alive", "Bohemian Rhapsody", "Under the Sea", "YMCA", "Billie Jean", "A Whole New World", "Single Ladies"],
        "TV": ["SpongeBob", "Stranger Things", "The Office", "The Mandalorian", "The Simpsons", "Pokémon", "Wednesday", "Bluey", "Full House", "iCarly", "Phineas and Ferb", "Henry Danger", "Scooby-Doo", "Teen Titans Go", "Gravity Falls"],
        "Food": ["Pizza", "Sushi", "Taco", "Ice Cream", "Hamburger", "Pancakes", "Hot Dog", "Popcorn", "Chicken Nuggets", "Spaghetti", "Watermelon", "Cupcake", "Donut", "Burrito", "Mac and Cheese"]
    };

    let customItems = JSON.parse(localStorage.getItem('charades_custom')) || [];
    let history = JSON.parse(localStorage.getItem('charades_history')) || [];
    let fullPool = [];
    let selectedCategory = "Movie";
    let maxTime = 90; 
    let timeLeft = 90;
    let timerInterval = null;

    function formatTime(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`; }

    function adjustMaxTime(amount) {
        maxTime = Math.max(30, Math.min(300, maxTime + amount));
        timeLeft = maxTime;
        document.getElementById('setting-display').innerText = `Set: ${formatTime(maxTime)}`;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        clearInterval(timerInterval);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        const disp = document.getElementById('timer-display');
        disp.innerText = formatTime(timeLeft);
        timerInterval = setInterval(() => {
            timeLeft--;
            disp.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                document.getElementById('display-text').innerText = "TIME UP!"; 
            }
        }, 1000);
    }

    function showTab(t) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(t + '-section').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
    }

    function selectCat(btn, c) {
        document.querySelectorAll('.cat-select-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedCategory = c;
    }

    function initPool() {
        fullPool = [];
        for (const cat in masterData) masterData[cat].forEach(item => fullPool.push({ cat, item }));
        customItems.forEach(obj => fullPool.push(obj));
    }

    function generateCharade() {
        if (fullPool.length === 0) initPool();
        const rand = Math.floor(Math.random() * fullPool.length);
        const sel = fullPool.splice(rand, 1)[0];
        document.getElementById('category-label').innerText = sel.cat;
        document.getElementById('display-text').innerText = sel.item;
        history.unshift(sel);
        localStorage.setItem('charades_history', JSON.stringify(history.slice(0, 50)));
        updateHistoryUI();
        startTimer();
    }

    function addCustomItem() {
        const val = document.getElementById('custom-input').value.trim();
        if (!val) return;
        customItems.push({ cat: selectedCategory, item: val });
        localStorage.setItem('charades_custom', JSON.stringify(customItems));
        initPool();
        document.getElementById('custom-input').value = "";
        updateCustomUI();
    }

    function removeCustom(i) {
        customItems.splice(i, 1);
        localStorage.setItem('charades_custom', JSON.stringify(customItems));
        initPool();
        updateCustomUI();
    }

    function updateCustomUI() {
        document.getElementById('custom-list').innerHTML = customItems.map((obj, i) => `
            <div class="list-item">
                <span><b>${obj.cat}:</b> ${obj.item}</span>
                <span class="del-x" onclick="removeCustom(${i})">X</span>
            </div>
        `).join('');
    }

    function updateHistoryUI() {
        document.getElementById('history-container').innerHTML = history.map(e => `
            <div class="list-item"><span><b>${e.cat}:</b> ${e.item}</span></div>
        `).join('');
    }

    function clearData() { 
        if(confirm("Wipe all custom words and history?")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    }

    initPool();
    updateCustomUI();
    updateHistoryUI();
</script>
</body>
</html>
