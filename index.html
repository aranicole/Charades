<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charades 🎭</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #4a041a;   
            --bg-mid: #881b42;    
            --bg-light: #e57ca3;  
            --card-bg: #6b0f30;
            --text: #ffffff;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: manipulation; background: var(--bg-dark);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
            color: var(--text); display: flex; justify-content: center; height: 100dvh; 
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh;
            display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.05); padding: 12px;
            box-sizing: border-box; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .app-header h1 {
            font-size: 1.3rem; text-align: center; margin: 5px 0 10px 0;
            color: var(--bg-light); text-transform: uppercase; letter-spacing: 3px; font-weight: 900;
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }

        .tab-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(229, 124, 163, 0.3);
            color: var(--text); padding: 8px 4px; border-radius: 12px;
            font-weight: 700; font-size: 0.6rem; flex: 1;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        .tab-btn.active { background: var(--bg-light); color: var(--bg-dark); border-color: var(--bg-light); }

        .content-section { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .content-section.active { display: flex; }

        .card {
            background: var(--card-bg); padding: 40px 20px; border-radius: 25px;
            text-align: center; flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; border: 2px solid var(--bg-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: relative; margin-bottom: 10px;
        }

        .category-tag { 
            position: absolute; top: 20px; width: 100%; left: 0;
            text-transform: uppercase; font-size: 0.75rem; color: var(--bg-light); 
            font-weight: bold; letter-spacing: 2px;
        }

        #display-text { font-size: 2.4rem; font-weight: 900; margin: 0; line-height: 1.1; }

        .btn-main {
            background: var(--bg-light); color: var(--bg-dark); border: none;
            padding: 1rem; font-size: 1.1rem; font-weight: 800; border-radius: 18px;
            cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .timer-area {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 12px 0; background: rgba(0,0,0,0.25); border-radius: 22px; margin-top: 10px;
        }

        .timer-circle {
            width: 75px; height: 75px; border-radius: 50%; border: 4px solid var(--bg-light);
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.6rem; background: rgba(0,0,0,0.3);
        }

        .time-adjuster { display: flex; align-items: center; gap: 20px; }
        .adj-btn { background: var(--bg-light); color: var(--bg-dark); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 900; }

        .list-container { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 12px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .category-header { color: var(--bg-light); font-weight: 800; font-size: 0.8rem; margin: 15px 0 8px 5px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--bg-light); padding-left: 8px; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        input { width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.4); border: 1px solid var(--bg-light); padding: 12px; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 10px; outline: none; }

        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .cat-select-btn { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--bg-mid); 
            color: var(--text); padding: 10px 4px; border-radius: 10px; 
            font-size: 0.65rem; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 5px; 
        }
        .cat-select-btn.selected { background: var(--bg-mid); border-color: var(--bg-light); }
        .cat-select-btn span.emoji { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header"><h1>Charades 🎭</h1></div>

    <div class="tabs">
        <button id="btn-game" class="tab-btn active" onclick="showTab('game')"><i class="fas fa-play"></i><span>PLAY</span></button>
        <button id="btn-library" class="tab-btn" onclick="showTab('library')"><i class="fas fa-book"></i><span>LIBRARY</span></button>
        <button id="btn-custom" class="tab-btn" onclick="showTab('custom')"><i class="fas fa-plus"></i><span>ADD</span></button>
        <button id="btn-history" class="tab-btn" onclick="showTab('history')"><i class="fas fa-history"></i><span>LOG</span></button>
    </div>

    <div id="game-section" class="content-section active">
        <div class="card">
            <span id="category-label" class="category-tag">Ready?</span>
            <h1 id="display-text">START</h1>
        </div>
        <button class="btn-main" onclick="generateCharade()">NEXT PROMPT</button>
        <div class="timer-area">
            <div id="timer-display" class="timer-circle">1:30</div>
            <div class="time-adjuster">
                <button class="adj-btn" onclick="adjustMaxTime(-15)">−</button>
                <span id="setting-display" style="font-weight:900; font-size: 0.85rem;">Set: 1:30</span>
                <button class="adj-btn" onclick="adjustMaxTime(15)">+</button>
            </div>
        </div>
    </div>

    <div id="library-section" class="content-section">
        <div class="list-container" id="library-container"></div>
    </div>

    <div id="custom-section" class="content-section">
        <div class="category-grid">
            <button class="cat-select-btn selected" onclick="selectCat(this, '🎬 Movie')"><span class="emoji">🎬</span><span>Movie</span></button>
            <button class="cat-select-btn" onclick="selectCat(this, '🎵 Song')"><span class="emoji">🎵</span><span>Song</span></button>
            <button class="cat-select-btn" onclick="selectCat(this, '📺 TV Series')"><span class="emoji">📺</span><span>TV Series</span></button>
            <button class="cat-select-btn" onclick="selectCat(this, '🍽️ Food')"><span class="emoji">🍽️</span><span>Food</span></button>
            <button class="cat-select-btn" onclick="selectCat(this, '👤 Person')"><span class="emoji">👤</span><span>Person</span></button>
        </div>
        <input type="text" id="custom-input" placeholder="Enter name or title...">
        <button class="btn-main" onclick="addCustomItem()">SAVE WORD</button>
        <div class="list-container" id="custom-list"></div>
    </div>

    <div id="history-section" class="content-section">
        <div class="list-container" id="history-container"></div>
        <button class="btn-main" style="background:var(--bg-mid); color:white; margin-top:10px" onclick="clearData()">WIPE DATA</button>
    </div>
</div>

<script>
    const masterData = {
        "🎬 Movie": ["Frozen", "Jurassic Park", "Toy Story", "Spider-Man", "The Matrix", "Lion King", "Home Alone", "Finding Nemo", "Avatar", "Inside Out", "The Avengers", "Jaws", "Star Wars", "Harry Potter", "Moana", "Shrek", "Titanic", "Ghostbusters", "Back to the Future", "Encanto"],
        "🎵 Song": ["Let It Go", "Thriller", "Baby Shark", "Shake It Off", "Happy", "Hakuna Matata", "Uptown Funk", "Old Town Road", "Stayin' Alive", "Bohemian Rhapsody", "Under the Sea", "YMCA", "Billie Jean", "A Whole New World", "Single Ladies"],
        "📺 TV Series": ["SpongeBob", "Stranger Things", "The Office", "The Mandalorian", "The Simpsons", "Pokémon", "Wednesday", "Bluey", "Full House", "iCarly", "Phineas and Ferb", "Henry Danger", "Scooby-Doo", "Teen Titans Go", "Gravity Falls"],
        "🍽️ Food": ["Pizza", "Sushi", "Taco", "Ice Cream", "Hamburger", "Pancakes", "Hot Dog", "Popcorn", "Chicken Nuggets", "Spaghetti", "Watermelon", "Cupcake", "Donut", "Burrito", "Mac and Cheese"],
        "👤 Person": ["Mickey Mouse", "Batman", "Elsa", "Darth Vader", "Harry Potter", "Spider-Man", "Buzz Lightyear", "Superman", "Pikachu", "Iron Man", "Jack Sparrow", "Santa Claus", "Mario", "Sonic", "Wonder Woman", "Olaf"]
    };

    let customItems = JSON.parse(localStorage.getItem('charades_custom')) || [];
    let history = JSON.parse(localStorage.getItem('charades_history')) || [];
    let fullPool = [];
    let selectedCategory = "🎬 Movie";
    let maxTime = 90; let timeLeft = 90; let timerInterval = null;

    function formatTime(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`; }

    function adjustMaxTime(amount) {
        maxTime = Math.max(30, Math.min(300, maxTime + amount));
        timeLeft = maxTime;
        document.getElementById('setting-display').innerText = `Set: ${formatTime(maxTime)}`;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        clearInterval(timerInterval);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        const disp = document.getElementById('timer-display');
        disp.innerText = formatTime(timeLeft);
        timerInterval = setInterval(() => {
            timeLeft--;
            disp.innerText = formatTime(timeLeft);
            if (timeLeft <= 0) { clearInterval(timerInterval); document.getElementById('display-text').innerText = "TIME UP!"; }
        }, 1000);
    }

    function showTab(t) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(t + '-section').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'library') updateLibraryUI();
    }

    function selectCat(btn, c) {
        document.querySelectorAll('.cat-select-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedCategory = c;
    }

    function initPool() {
        fullPool = [];
        for (const cat in masterData) masterData[cat].forEach(item => fullPool.push({ cat, item }));
        customItems.forEach(obj => fullPool.push(obj));
    }

    function generateCharade() {
        if (fullPool.length === 0) initPool();
        const rand = Math.floor(Math.random() * fullPool.length);
        const sel = fullPool.splice(rand, 1)[0];
        document.getElementById('category-label').innerText = sel.cat;
        document.getElementById('display-text').innerText = sel.item;
        history.unshift(sel);
        localStorage.setItem('charades_history', JSON.stringify(history.slice(0, 50)));
        updateHistoryUI();
        startTimer();
    }

    function addCustomItem() {
        const inputEl = document.getElementById('custom-input');
        const val = inputEl.value.trim();
        if (!val) return;

        // Duplicate Check Logic
        const isDuplicate = fullPool.some(entry => entry.item.toLowerCase() === val.toLowerCase());
        
        if (isDuplicate) {
            alert("This word is already in the game!");
            inputEl.value = "";
            return;
        }

        customItems.push({ cat: selectedCategory, item: val });
        localStorage.setItem('charades_custom', JSON.stringify(customItems));
        initPool();
        inputEl.value = "";
        updateCustomUI();
        updateLibraryUI(); // Ensure Library shows the new word immediately
    }

    function removeCustom(i) {
        customItems.splice(i, 1);
        localStorage.setItem('charades_custom', JSON.stringify(customItems));
        initPool();
        updateCustomUI();
        updateLibraryUI();
    }

    function updateCustomUI() {
        document.getElementById('custom-list').innerHTML = customItems.map((obj, i) => `
            <div class="list-item"><span><b>${obj.cat}:</b> ${obj.item}</span><span onclick="removeCustom(${i})" style="color:#ff5f5f; font-weight:bold; padding: 0 10px;">X</span></div>
        `).join('');
    }

    function updateLibraryUI() {
        let html = "";
        // Combine master and custom data for the library view
        const combinedData = JSON.parse(JSON.stringify(masterData));
        customItems.forEach(c => {
            if (!combinedData[c.cat]) combinedData[c.cat] = [];
            combinedData[c.cat].push(c.item + " (Custom)");
        });

        for (const cat in combinedData) {
            html += `<div class="category-header">${cat}</div>`;
            combinedData[cat].forEach(item => { 
                html += `<div class="list-item"><span>${item}</span></div>`; 
            });
        }
        document.getElementById('library-container').innerHTML = html;
    }

    function updateHistoryUI() {
        document.getElementById('history-container').innerHTML = history.map(e => `
            <div class="list-item"><span><b>${e.cat}:</b> ${e.item}</span></div>
        `).join('');
    }

    function clearData() { if(confirm("Clear history and custom words?")) { localStorage.clear(); location.reload(); } }

    // Initial Load
    initPool(); 
    updateCustomUI(); 
    updateHistoryUI(); 
    updateLibraryUI();
</script>
</body>
</html>
