<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charades 🎭</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #4a041a;   
            --bg-mid: #881b42;    
            --bg-light: #e57ca3;  
            --card-bg: #6b0f30;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 500px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header Title Style */
        .app-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .app-header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 1px;
            color: var(--bg-light);
            text-transform: uppercase;
        }

        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 15px; 
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--bg-light);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active { background: var(--bg-light); color: var(--bg-dark); }

        .content-section { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .content-section.active { display: flex; }

        .card {
            background: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 25px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px solid var(--bg-light);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        .category-tag { text-transform: uppercase; font-size: 0.8rem; color: var(--bg-light); margin-bottom: 0.8rem; font-weight: bold; }
        #display-text { font-size: 2.4rem; font-weight: 900; margin: 0; line-height: 1.1; }

        .btn-main {
            background: var(--bg-light);
            color: var(--bg-dark);
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }

        .timer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: auto;
            padding: 15px 0;
            background: rgba(0,0,0,0.15);
            border-radius: 25px;
        }

        .timer-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 2rem;
            background: rgba(0,0,0,0.4);
        }

        .timer-low { border-color: #ff5f5f; color: #ff5f5f; animation: pulse 0.8s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .time-adjuster {
            display: flex;
            align-items: center;
            gap: 25px;
            background: rgba(255,255,255,0.05);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .adj-btn {
            background: var(--bg-light);
            color: var(--bg-dark);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        .cat-select-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--bg-mid); color: var(--text); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; text-align: left; display: flex; align-items: center; gap: 8px;}
        .cat-select-btn.selected { background: var(--bg-mid); border-color: var(--bg-light); }
        input { background: rgba(0,0,0,0.4); border: 1px solid var(--bg-light); padding: 12px; border-radius: 12px; color: white; outline: none; margin-bottom: 10px; width: calc(100% - 26px); }
        .list-container { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; flex: 1; overflow-y: auto; margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .del-btn { color: #ff5f5f; cursor: pointer; border: 1px solid #ff5f5f; padding: 4px 8px; border-radius: 5px; font-size: 0.65rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>Charades 🎭</h1>
    </div>

    <div class="tabs">
        <button id="btn-game" class="tab-btn active" onclick="showTab('game')"><i class="fas fa-gamepad"></i> PLAY</button>
        <button id="btn-custom" class="tab-btn" onclick="showTab('custom')"><i class="fas fa-pen"></i> ADD</button>
        <button id="btn-library" class="tab-btn" onclick="showTab('library')"><i class="fas fa-book"></i> LIBRARY</button>
        <button id="btn-history" class="tab-btn" onclick="showTab('history')"><i class="fas fa-clock-rotate-left"></i> HISTORY</button>
    </div>

    <div id="game-section" class="content-section active">
        <div class="card">
            <span id="category-label" class="category-tag">Ready?</span>
            <h1 id="display-text">START</h1>
        </div>
        
        <button class="btn-main" onclick="generateCharade()">NEXT PROMPT</button>

        <div class="timer-area">
            <div id="timer-display" class="timer-circle">1:30</div>
            <div class="time-adjuster">
                <button class="adj-btn" onclick="adjustMaxTime(-15)">−</button>
                <span id="setting-display" style="font-size:1.1rem; font-weight:900;">Set: 1:30</span>
                <button class="adj-btn" onclick="adjustMaxTime(15)">+</button>
            </div>
        </div>
    </div>

    <div id="custom-section" class="content-section">
        <div class="category-grid">
            <button class="cat-select-btn selected" onclick="selectCat(this, 'Movie')"><i class="fas fa-film"></i> Movie</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'Song')"><i class="fas fa-music"></i> Song</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'TV')"><i class="fas fa-tv"></i> TV</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'Food')"><i class="fas fa-utensils"></i> Food</button>
            <button class="cat-select-btn" onclick="selectCat(this, 'Person')"><i class="fas fa-user"></i> Person</button>
        </div>
        <input type="text" id="custom-input" placeholder="Type word...">
        <button class="btn-main" style="margin-top:0" onclick="addCustomItem()">ADD TO DECK</button>
        <div class="list-container" id="custom-list"></div>
    </div>

    <div id="library-section" class="content-section">
        <div class="list-container" id="library-container"></div>
    </div>

    <div id="history-section" class="content-section">
        <div class="list-container" id="history-container"></div>
        <button class="btn-main" style="background:var(--bg-mid); color:white; margin-top:10px" onclick="clearData()">WIPE ALL DATA</button>
    </div>
</div>

<script>
    const masterData = {
        "Movie": ["Frozen", "Jurassic Park", "Toy Story", "Spider-Man", "The Matrix", "Lion King", "Home Alone", "Finding Nemo", "Avatar", "Inside Out", "The Avengers", "Jaws", "Star Wars", "Harry Potter", "Moana", "Shrek", "Titanic", "Ghostbusters", "Back to the Future", "Encanto"],
        "Song": ["Let It Go", "Thriller", "Baby Shark", "Shake It Off", "Happy", "Hakuna Matata", "Uptown Funk", "Old Town Road", "Stayin' Alive", "Bohemian Rhapsody", "Under the Sea", "YMCA", "Billie Jean", "A Whole New World", "Single Ladies"],
        "TV": ["SpongeBob", "Stranger Things", "The Office", "The Mandalorian", "The Simpsons", "Pokémon", "Wednesday", "Bluey", "Full House", "iCarly", "Phineas and Ferb", "Henry Danger", "Scooby-Doo", "Teen Titans Go", "Gravity Falls"],
        "Food": ["Pizza", "Sushi", "Taco", "Ice Cream", "Hamburger", "Pancakes", "Hot Dog", "Popcorn", "Chicken Nuggets", "Spaghetti", "Watermelon", "Cupcake", "Donut", "Burrito", "Mac and Cheese"],
        "Person": ["Mickey Mouse", "Batman", "Elsa", "Darth Vader", "Harry Potter", "Spider-Man", "Buzz Lightyear", "Superman", "Pikachu", "Iron Man", "Jack Sparrow", "Santa Claus", "Mario", "Sonic", "Wonder Woman", "Olaf"]
    };

    let customItems = JSON.parse(localStorage.getItem('magenta_custom')) || [];
    let history = JSON.parse(localStorage.getItem('magenta_history')) || [];
    let fullPool = [];
    let selectedCategory = "Movie";
    
    let maxTime = 90; 
    let timeLeft = 90;
    let timerInterval = null;

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function adjustMaxTime(amount) {
        maxTime = Math.max(30, Math.min(300, maxTime + amount));
        timeLeft = maxTime;
        document.getElementById('setting-display').innerText = `Set: ${formatTime(maxTime)}`;
        document.getElementById('timer-display').innerText = formatTime(timeLeft);
        clearInterval(timerInterval);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        const display = document.getElementById('timer-display');
        display.classList.remove('timer-low');
        display.innerText = formatTime(timeLeft);
        timerInterval = setInterval(() => {
            timeLeft--;
            display.innerText = formatTime(timeLeft);
            if (timeLeft <= 10) display.classList.add('timer-low');
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('display-text').innerText = "TIME UP!";
            }
        }, 1000);
    }

    function showTab(tabName) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabName + '-section').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tabName).classList.add('active');
        if(tabName === 'library') updateLibraryUI();
    }

    function selectCat(btn, cat) {
        document.querySelectorAll('.cat-select-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedCategory = cat;
    }

    function initPool() {
        fullPool = [];
        for (const cat in masterData) {
            masterData[cat].forEach(item => fullPool.push({ cat, item }));
        }
        customItems.forEach(obj => fullPool.push(obj));
    }

    function generateCharade() {
        if (fullPool.length === 0) initPool();
        const randomIndex = Math.floor(Math.random() * fullPool.length);
        const selected = fullPool.splice(randomIndex, 1)[0];
        document.getElementById('category-label').innerText = selected.cat;
        document.getElementById('display-text').innerText = selected.item;
        history.unshift(selected);
        localStorage.setItem('magenta_history', JSON.stringify(history));
        updateHistoryUI();
        startTimer();
    }

    function addCustomItem() {
        const input = document.getElementById('custom-input');
        const word = input.value.trim();
        if (!word) return;
        customItems.push({ cat: selectedCategory, item: word });
        localStorage.setItem('magenta_custom', JSON.stringify(customItems));
        initPool();
        input.value = "";
        updateCustomUI();
    }

    function removeCustom(index) {
        customItems.splice(index, 1);
        localStorage.setItem('magenta_custom', JSON.stringify(customItems));
        initPool();
        updateCustomUI();
    }

    function updateCustomUI() {
        document.getElementById('custom-list').innerHTML = customItems.map((obj, i) => `
            <div class="list-item">
                <span><b>${obj.cat}:</b> ${obj.item}</span>
                <span class="del-btn" onclick="removeCustom(${i})">Delete</span>
            </div>
        `).join('');
    }

    function updateLibraryUI() {
        let html = "";
        if (customItems.length > 0) {
            html += `<div style="color:var(--bg-light); font-weight:bold;">YOUR ADDITIONS</div>`;
            customItems.forEach(obj => { html += `<div class="list-item"><span>${obj.cat}: ${obj.item}</span></div>`; });
        }
        for (const cat in masterData) {
            html += `<div style="color:var(--bg-light); font-weight:bold; margin-top:10px;">${cat.toUpperCase()}</div>`;
            masterData[cat].forEach(item => { html += `<div class="list-item"><span>${item}</span></div>`; });
        }
        document.getElementById('library-container').innerHTML = html;
    }

    function updateHistoryUI() {
        document.getElementById('history-container').innerHTML = history.map(e => `
            <div class="list-item"><span>${e.cat}: ${e.item}</span></div>
        `).join('');
    }

    function clearData() {
        if(confirm("Wipe everything?")) {
            localStorage.clear();
            customItems = []; history = [];
            initPool(); updateCustomUI(); updateHistoryUI();
            document.getElementById('display-text').innerText = "START";
        }
    }

    initPool();
    updateCustomUI();
    updateHistoryUI();
</script>
</body>
</html>
